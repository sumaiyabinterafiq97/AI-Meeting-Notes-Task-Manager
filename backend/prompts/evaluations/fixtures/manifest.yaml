# MeetingMind AI — Eval Fixture Manifest
version: "1.0.0"
description: Golden fixture index for automated prompt evaluation

defaults:
  prompt_version: "2.1.0"
  schema_version: "2.1"
  model_hint: gpt-4o
  runs_per_case: 3
  consistency_threshold: 0.9
  scoring:
    modes: [schema_validity, rule_based]
    pass_threshold: 1.0

quality_gates:
  schema_validity_min: 0.98
  hallucination_rate_max: 0.05
  precision_drop_max_vs_baseline: 0.05

suites:
  summarizer:
    file: summarizer.yaml
    agent: summarizer
    alias: meeting-summary
    case_count: 7
    metrics: [hallucination_rate, topic_coverage, consistency]

  task-extractor:
    file: task-extractor.yaml
    agent: task-extractor
    case_count: 9
    metrics: [precision, recall, assignee_accuracy]

  decision-agent:
    file: decision-agent.yaml
    agent: decision-agent
    case_count: 9
    metrics: [precision, false_positive_rate, empty_array_accuracy]

  risk-analyzer:
    file: risk-analyzer.yaml
    agent: risk-analyzer
    case_count: 9
    metrics: [recall, precision, severity_calibration]

  chat-agent:
    file: chat-agent.yaml
    agent: chat-agent
    model_hint: gpt-4o-mini
    case_count: 10
    metrics: [citation_accuracy, grounded_rate, injection_resistance]

  weekly-report:
    file: weekly-report.yaml
    agent: weekly-report
    case_count: 8
    metrics: [factual_accuracy, citation_coverage, hallucination_rate]

  knowledge-agent:
    file: knowledge-agent.yaml
    agent: knowledge-agent
    case_count: 8
    metrics: [precision, source_ref_completeness, false_positive_rate]

schema_versions:
  "2.0":
    catalog: ../../response-format.prompt.md
    strict: true
    legacy: true
  "2.1":
    catalog: ../../schemas/v2.1-schemas.json
    strict: true
    feature_flag: PROMPT_SCHEMA_V2_1

